<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:240px;height:240px;overflow:hidden}
  .tile{width:240px;height:240px;border-radius:54px;
    background:radial-gradient(120% 120% at 30% 20%,#D6FF4E 0%,#C6F432 55%,#A9D81F 100%);
    display:flex;align-items:center;justify-content:center;position:relative;
    box-shadow:inset 0 4px 0 rgba(255,255,255,.35),inset 0 -8px 24px rgba(0,0,0,.12)}
  .s{font-family:Inter,-apple-system,system-ui,sans-serif;font-weight:900;
    font-size:172px;letter-spacing:-8px;color:#0B0B0F;line-height:1;
    transform:translateY(-4px)}
  /* swipe spark */
  .spk{position:absolute;font-size:34px;color:#0B0B0F;opacity:.85}
  .spk.a{top:30px;right:40px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet"></head>
<body><div class="tile"><div class="s">S</div><div class="spk a">✦</div></div></body></html>
